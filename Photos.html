	<script>
		var currentIndex = 0;
		var photoItems = document.querySelectorAll('.photo-item');

		function openLightbox(el) {
			var img = el.querySelector('img');
			document.getElementById('lightbox-img').src = img.src;
			document.getElementById('lightbox').classList.add('active');
			currentIndex = Array.prototype.indexOf.call(photoItems, el);
			document.body.style.overflow = 'hidden';
		}

		function closeLightbox(e) {
			if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
				document.getElementById('lightbox').classList.remove('active');
				document.body.style.overflow = '';
			}
		}

		function navigateLightbox(e, direction) {
			e.stopPropagation();
			currentIndex += direction;
			if (currentIndex < 0) currentIndex = photoItems.length - 1;
			if (currentIndex >= photoItems.length) currentIndex = 0;
			var img = photoItems[currentIndex].querySelector('img');
			document.getElementById('lightbox-img').src = img.src;
		}

		document.addEventListener('keydown', function(e) {
			var lightbox = document.getElementById('lightbox');
			if (!lightbox.classList.contains('active')) return;
			if (e.key === 'Escape') {
				lightbox.classList.remove('active');
				document.body.style.overflow = '';
			}
			if (e.key === 'ArrowLeft') navigateLightbox(e, -1);
			if (e.key === 'ArrowRight') navigateLightbox(e, 1);
		});
	</script>
